
services:
  clindoc-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - OLLAMA_URL=http://ollama:11434
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-pull:
    image: curlimages/curl:latest
    depends_on:
      - ollama
    command: >
      sh -c "sleep 5 && curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"mistral\"}'"
    restart: "no"

volumes:
  ollama_data:
